<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vulnerable CRUD Lab</title>
    <style>
      :root {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #20242c;
        background: #f4f6f8;
        --line: #d7dde7;
        --muted: #687587;
        --ink: #20242c;
        --surface: #ffffff;
        --red: #b8323f;
        --amber: #b46b13;
        --teal: #007c89;
      }
      * { box-sizing: border-box; }
      body { margin: 0; }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 18px 22px;
        border-bottom: 1px solid var(--line);
        background: var(--surface);
      }
      h1, h2, h3, p { margin: 0; }
      h1 { font-size: 22px; }
      header p { color: var(--muted); }
      main {
        display: grid;
        grid-template-columns: 340px minmax(0, 1fr);
        gap: 16px;
        padding: 18px 22px;
      }
      section {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        overflow: hidden;
      }
      .head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 13px 14px;
        border-bottom: 1px solid var(--line);
      }
      .body { display: grid; gap: 12px; padding: 14px; }
      label { display: grid; gap: 5px; color: var(--muted); font-size: 12px; font-weight: 800; text-transform: uppercase; }
      input, textarea, button {
        font: inherit;
      }
      input, textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 9px 10px;
      }
      textarea { min-height: 100px; resize: vertical; }
      button {
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fff;
        color: var(--ink);
        cursor: pointer;
        font-weight: 800;
      }
      button.primary {
        border-color: var(--teal);
        background: var(--teal);
        color: white;
      }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
      .stack { display: grid; gap: 12px; }
      .note {
        display: grid;
        gap: 7px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
      }
      .note small, code, .muted { color: var(--muted); }
      .note-body {
        border-left: 3px solid var(--amber);
        padding-left: 10px;
      }
      .danger {
        padding: 10px 12px;
        border: 1px solid rgba(184, 50, 63, 0.28);
        border-radius: 8px;
        background: #ffe9ec;
        color: var(--red);
        font-weight: 800;
      }
      pre {
        overflow: auto;
        max-height: 360px;
        margin: 0;
        padding: 12px;
        border-radius: 8px;
        background: #171b22;
        color: #d9e2ee;
        font-size: 12px;
      }
      @media (max-width: 860px) {
        main { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1>Vulnerable CRUD Lab</h1>
        <p>Intentionally unsafe local SQLite app for scanner testing.</p>
      </div>
      <code id="userBadge">X-User-Id: 1</code>
    </header>
    <main>
      <section>
        <div class="head"><h2>Controls</h2><span class="muted">local only</span></div>
        <div class="body">
          <div id="banner"></div>
          <div class="danger">This app is intentionally vulnerable. Do not expose it publicly.</div>
          <label>Username <input id="username" value="alice" /></label>
          <label>Password <input id="password" value="password1" /></label>
          <button class="primary" id="login">Login</button>
          <label>Acting user id <input id="userId" value="1" /></label>
          <button id="loadNotes">Load notes</button>
          <label>Search <input id="search" placeholder="search term" /></label>
          <button id="runSearch">Run vulnerable search</button>
          <label>Title <input id="title" value="New test note" /></label>
          <label>Body <textarea id="body"><strong>Hello</strong> from the vulnerable CRUD lab.</textarea></label>
          <div class="grid">
            <label>owner_id <input id="ownerId" value="1" /></label>
            <label>is_public <input id="isPublic" value="1" /></label>
          </div>
          <button class="primary" id="createNote">Create note</button>
        </div>
      </section>
      <div class="stack">
        <section>
          <div class="head"><h2>Notes</h2><span class="muted">stored XSS rendering is intentional</span></div>
          <div class="body" id="notes"></div>
        </section>
        <section>
          <div class="head"><h2>Raw Response</h2><button id="debugUsers">Debug users</button></div>
          <div class="body"><pre id="raw">{}</pre></div>
        </section>
      </div>
    </main>
    <script>
      const $ = (id) => document.getElementById(id);
      const banner = new URLSearchParams(location.search).get("banner");
      if (banner) {
        $("banner").innerHTML = banner;
      }

      function headers() {
        return { "content-type": "application/json", "x-user-id": $("userId").value };
      }

      function showRaw(data) {
        $("raw").textContent = JSON.stringify(data, null, 2);
      }

      async function request(path, options = {}) {
        const response = await fetch(path, { ...options, headers: { ...headers(), ...(options.headers || {}) } });
        const data = await response.json();
        showRaw(data);
        return data;
      }

      async function loadNotes() {
        $("userBadge").textContent = `X-User-Id: ${$("userId").value}`;
        const data = await request("/api/notes");
        renderNotes(data.notes || []);
      }

      function renderNotes(notes) {
        $("notes").innerHTML = notes.map((note) => `
          <article class="note">
            <h3>#${note.id} ${escapeHtml(note.title)}</h3>
            <small>owner ${escapeHtml(note.owner || String(note.owner_id))} · public ${note.is_public}</small>
            <div class="note-body">${note.body}</div>
            <div class="grid">
              <button onclick="viewNote(${note.id})">View by id</button>
              <button onclick="deleteNote(${note.id})">Delete by id</button>
            </div>
          </article>
        `).join("");
      }

      async function viewNote(id) {
        const data = await request(`/api/notes/${id}`);
        renderNotes(data.note ? [data.note] : []);
      }

      async function deleteNote(id) {
        await request(`/api/notes/${id}`, { method: "DELETE" });
        await loadNotes();
      }

      $("login").onclick = async () => {
        const data = await request("/api/login", {
          method: "POST",
          body: JSON.stringify({ username: $("username").value, password: $("password").value })
        });
        if (data.user) {
          $("userId").value = data.user.id;
          $("userBadge").textContent = `X-User-Id: ${data.user.id}`;
          await loadNotes();
        }
      };

      $("loadNotes").onclick = loadNotes;
      $("runSearch").onclick = async () => {
        const data = await request(`/api/search?q=${encodeURIComponent($("search").value)}`);
        renderNotes(data.notes || []);
      };
      $("createNote").onclick = async () => {
        await request("/api/notes", {
          method: "POST",
          body: JSON.stringify({
            title: $("title").value,
            body: $("body").value,
            owner_id: Number($("ownerId").value),
            is_public: $("isPublic").value === "1"
          })
        });
        await loadNotes();
      };
      $("debugUsers").onclick = () => request("/api/debug/users");

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          "\"": "&quot;",
          "'": "&#039;"
        })[char]);
      }

      loadNotes();
    </script>
  </body>
</html>
